<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – JossyB</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --gold:#c9a84c;--gold-light:#e8c96a;--dark:#0d0d0d;--dark2:#161616;--dark3:#1e1e1e;--border:#2a2a2a;--text:#f0ede8;--muted:#888;--success:#4caf7d;--error:#e05252; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(201,168,76,0.06) 0%,transparent 60%)}
    .container{position:relative;z-index:1;width:100%;max-width:420px}
    .logo-wrap{text-align:center;margin-bottom:36px}
    .logo-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:0.08em;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logo-sub{font-size:11px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:4px}
    .card{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:40px}
    .card-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px}
    .card-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
    .form-group{margin-bottom:18px}
    label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:8px}
    input{width:100%;padding:13px 16px;background:var(--dark3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s}
    input:focus{border-color:var(--gold)}
    input::placeholder{color:#444}
    .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;border-radius:10px;color:#0d0d0d;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
    .submit-btn:hover{opacity:0.9}
    .submit-btn:disabled{opacity:0.5;cursor:not-allowed}
    .alert{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:18px;display:none}
    .alert.error{background:rgba(224,82,82,0.1);border:1px solid rgba(224,82,82,0.3);color:var(--error);display:block}
    .alert.success{background:rgba(76,175,125,0.1);border:1px solid rgba(76,175,125,0.3);color:var(--success);display:block}
    .back{text-align:center;margin-top:20px;font-size:14px;color:var(--muted)}
    .back a{color:var(--gold);text-decoration:none}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="container">
    <div class="logo-wrap">
      <a href="index.html" style="text-decoration:none">
        <div class="logo-name">JOSSYB</div>
        <div class="logo-sub">Technical Resources Nigeria Limited</div>
      </a>
    </div>
    <div class="card">
      <h1 class="card-title">Set New Password</h1>
      <p class="card-sub">Enter your new password below.</p>
      <div id="alert" class="alert"></div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPass" placeholder="Min. 8 characters" minlength="8" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPass" placeholder="Repeat password" />
      </div>
      <button class="submit-btn" id="resetBtn" onclick="handleReset()">Update Password</button>
      <div class="back"><a href="login.html">← Back to login</a></div>
    </div>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://ghsnlxqaztuovxlairvn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdoc25seHFhenR1b3Z4bGFpcnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Nzg1ODEsImV4cCI6MjA5NjA1NDU4MX0.exDAYCyq3_iZj7YPWeqSR7XxizWsus3R0ChuAceqBpw'
    );

    function showAlert(msg, type) { const el = document.getElementById('alert'); el.textContent = msg; el.className = 'alert ' + type; }

    window.handleReset = async function() {
      const p1 = document.getElementById('newPass').value;
      const p2 = document.getElementById('confirmPass').value;
      if (!p1 || p1.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }
      if (p1 !== p2) { showAlert('Passwords do not match.', 'error'); return; }
      const btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.textContent = 'Updating...';
      const { error } = await supabase.auth.updateUser({ password: p1 });
      if (error) { showAlert(error.message, 'error'); btn.disabled = false; btn.textContent = 'Update Password'; }
      else { showAlert('Password updated! Redirecting to login...', 'success'); setTimeout(() => window.location.href = 'login.html', 2000); }
    };
  </script>
</body>
</html>
