<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – JossyB Technical Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --dark: #0d0d0d;
      --dark2: #161616;
      --dark3: #1e1e1e;
      --border: #2a2a2a;
      --text: #f0ede8;
      --muted: #888;
      --success: #4caf7d;
      --error: #e05252;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .bg-pattern {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 80% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 20% 80%, rgba(201,168,76,0.05) 0%, transparent 60%);
    }
    .grid-lines {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 500px;
    }
    .logo-wrap { text-align: center; margin-bottom: 36px; }
    .logo-wrap a { text-decoration: none; }
    .logo-name {
      font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }
    .card {
      background: var(--dark2); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px;
    }
    .card-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .card-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .google-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 13px 20px; background: var(--dark3); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-bottom: 20px;
    }
    .google-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.05); }
    .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; color: var(--muted); font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.03em; }
    input, select {
      width: 100%; padding: 13px 16px; background: var(--dark3);
      border: 1px solid var(--border); border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: var(--gold); }
    input::placeholder { color: #444; }
    select option { background: var(--dark2); }
    .referral-note {
      background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--gold);
      margin-bottom: 18px; display: none;
    }
    .referral-note.show { display: block; }
    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border: none; border-radius: 10px; color: #0d0d0d;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
    }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .login-link { text-align: center; margin-top: 24px; font-size: 14px; color: var(--muted); }
    .login-link a { color: var(--gold); text-decoration: none; font-weight: 500; }
    .login-link a:hover { text-decoration: underline; }
    .terms { font-size: 12px; color: var(--muted); margin-top: 16px; text-align: center; line-height: 1.6; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 18px; display: none; }
    .alert.error { background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.3); color: var(--error); display: block; }
    .alert.success { background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.3); color: var(--success); display: block; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3); border-top-color: #0d0d0d;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media(max-width:480px) { .row { grid-template-columns: 1fr; } .card { padding: 28px 20px; } }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="grid-lines"></div>
  <div class="container">
    <div class="logo-wrap">
      <a href="index.html">
        <div class="logo-name">JOSSYB</div>
        <div class="logo-sub">Technical Resources Nigeria Limited</div>
      </a>
    </div>
    <div class="card">
      <h1 class="card-title">Create Your Account</h1>
      <p class="card-sub">Join JossyB — it's free to get started</p>
      <div id="alert" class="alert"></div>
      <button class="google-btn" id="googleBtn" onclick="signUpWithGoogle()">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign up with Google
      </button>
      <div class="divider">or sign up with email</div>
      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="firstName" placeholder="John" required />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lastName" placeholder="Doe" required />
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Phone / WhatsApp</label>
          <input type="tel" id="phone" placeholder="+234 800 000 0000" />
        </div>
        <div class="row">
          <div class="form-group">
            <label>Country</label>
            <select id="country">
              <option value="">Select country</option>
              <option value="Nigeria">🇳🇬 Nigeria</option>
              <option value="Ghana">🇬🇭 Ghana</option>
              <option value="Kenya">🇰🇪 Kenya</option>
              <option value="South Africa">🇿🇦 South Africa</option>
              <option value="United Kingdom">🇬🇧 United Kingdom</option>
              <option value="United States">🇺🇸 United States</option>
              <option value="Canada">🇨🇦 Canada</option>
              <option value="Australia">🇦🇺 Australia</option>
              <option value="Other">🌐 Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Service Interest</label>
            <select id="service">
              <option value="">Select service</option>
              <option value="Business Development">Business Development</option>
              <option value="Social Media Marketing">Social Media Marketing</option>
              <option value="Side Hustle & Promo Deals">Side Hustle & Promo Deals</option>
              <option value="Skill Acquisition">Skill Acquisition</option>
              <option value="All Services">All Services</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" minlength="8" required />
        </div>
        <div class="form-group">
          <label>Referral Code <span style="color:var(--muted);font-weight:400">(optional)</span></label>
          <input type="text" id="referralCode" placeholder="Enter referral code if you have one" oninput="checkReferralCode(this.value)" style="text-transform:uppercase" />
        </div>
        <div class="referral-note" id="referralNote">🎉 Referral code applied!</div>
        <button type="submit" class="submit-btn" id="signupBtn">Create Free Account</button>
      </form>
      <div class="login-link">Already have an account? <a href="login.html">Sign in →</a></div>
      <p class="terms">By signing up, you agree to our Terms of Service and Privacy Policy.</p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://ghsnlxqaztuovxlairvn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdoc25seHFhenR1b3Z4bGFpcnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Nzg1ODEsImV4cCI6MjA5NjA1NDU4MX0.exDAYCyq3_iZj7YPWeqSR7XxizWsus3R0ChuAceqBpw'
    );

    // Pre-fill referral code from URL ?ref=XXXXXX
    const params = new URLSearchParams(window.location.search);
    if (params.get('ref')) {
      document.getElementById('referralCode').value = params.get('ref').toUpperCase();
      document.getElementById('referralNote').classList.add('show');
    }

    window.checkReferralCode = function(val) {
      const note = document.getElementById('referralNote');
      note.classList.toggle('show', val.length >= 6);
    };

    window.handleSignup = async function(e) {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Creating account...';

      const fullName = document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const phone = document.getElementById('phone').value;
      const country = document.getElementById('country').value;
      const service = document.getElementById('service').value;
      const referralCode = document.getElementById('referralCode').value.toUpperCase();

      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: {
          data: { full_name: fullName }
        }
      });

      if (error) {
        showAlert(error.message, 'error');
        btn.disabled = false; btn.innerHTML = 'Create Free Account';
        return;
      }

      // Update profile with extra info
      if (data.user) {
        await supabase.from('profiles').update({
          full_name: fullName,
          phone, country,
          service_interest: service,
          referred_by: referralCode || null
        }).eq('id', data.user.id);

        // Record the referral
        if (referralCode) {
          const { data: referrer } = await supabase
            .from('profiles').select('id').eq('referral_code', referralCode).single();
          if (referrer) {
            await supabase.from('referrals').insert({
              referrer_id: referrer.id,
              referred_user_id: data.user.id,
              referred_email: email,
              status: 'pending'
            });
          }
        }
      }

      showAlert('Account created! Please check your email to verify.', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 2000);
    };

    window.signUpWithGoogle = async function() {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      const ref = document.getElementById('referralCode').value.toUpperCase();
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/Jossy-B-Tech/dashboard.html' + (ref ? '?ref=' + ref : '')
        }
      });
      if (error) { showAlert(error.message, 'error'); btn.disabled = false; }
    };

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg; el.className = 'alert ' + type;
    }

    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
