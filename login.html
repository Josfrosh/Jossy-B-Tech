<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – JossyB Technical Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --dark: #0d0d0d;
      --dark2: #161616;
      --dark3: #1e1e1e;
      --border: #2a2a2a;
      --text: #f0ede8;
      --muted: #888;
      --success: #4caf7d;
      --error: #e05252;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-pattern {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 60%);
    }
    .grid-lines {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      padding: 20px;
    }
    .logo-wrap {
      text-align: center; margin-bottom: 40px;
    }
    .logo-wrap a { text-decoration: none; }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-sub {
      font-size: 11px; color: var(--muted);
      letter-spacing: 0.15em; text-transform: uppercase;
      margin-top: 4px;
    }
    .card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 700;
      margin-bottom: 8px;
    }
    .card-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .google-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 13px 20px;
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      text-decoration: none;
    }
    .google-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.05); }
    .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: var(--muted); font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--muted); margin-bottom: 8px; letter-spacing: 0.03em;
    }
    input {
      width: 100%; padding: 13px 16px;
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold); }
    input::placeholder { color: #444; }

    .forgot {
      text-align: right; margin-top: -10px; margin-bottom: 18px;
    }
    .forgot a { font-size: 13px; color: var(--gold); text-decoration: none; }
    .forgot a:hover { text-decoration: underline; }

    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border: none; border-radius: 10px;
      color: #0d0d0d; font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .signup-link {
      text-align: center; margin-top: 24px;
      font-size: 14px; color: var(--muted);
    }
    .signup-link a { color: var(--gold); text-decoration: none; font-weight: 500; }
    .signup-link a:hover { text-decoration: underline; }

    .alert {
      padding: 12px 16px; border-radius: 8px;
      font-size: 14px; margin-bottom: 18px; display: none;
    }
    .alert.error { background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.3); color: var(--error); display: block; }
    .alert.success { background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.3); color: var(--success); display: block; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0d0d0d;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="grid-lines"></div>

  <div class="container">
    <div class="logo-wrap">
      <a href="index.html">
        <div class="logo-name">JOSSYB</div>
        <div class="logo-sub">Technical Resources Nigeria Limited</div>
      </a>
    </div>

    <div class="card">
      <h1 class="card-title">Welcome back</h1>
      <p class="card-sub">Sign in to your JossyB account</p>

      <div id="alert" class="alert"></div>

      <button class="google-btn" id="googleBtn" onclick="signInWithGoogle()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider">or sign in with email</div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <div class="forgot">
          <a href="#" onclick="handleForgotPassword(event)">Forgot password?</a>
        </div>
        <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
      </form>

      <div class="signup-link">
        Don't have an account? <a href="signup.html">Create one free →</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://ghsnlxqaztuovxlairvn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdoc25seHFhenR1b3Z4bGFpcnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Nzg1ODEsImV4cCI6MjA5NjA1NDU4MX0.exDAYCyq3_iZj7YPWeqSR7XxizWsus3R0ChuAceqBpw'
    );

    // Redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'dashboard.html';

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + type;
    }

    window.handleLogin = async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showAlert(error.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      } else {
        showAlert('Success! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      }
    };

    window.signInWithGoogle = async function() {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="border-top-color:var(--gold)"></span>Connecting...';
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/Jossy-B-Tech/dashboard.html' }
      });
      if (error) {
        showAlert(error.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Continue with Google';
      }
    };

    window.handleForgotPassword = async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      if (!email) { showAlert('Enter your email address first.', 'error'); return; }
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/Jossy-B-Tech/reset-password.html'
      });
      if (error) showAlert(error.message, 'error');
      else showAlert('Password reset email sent! Check your inbox.', 'success');
    };
  </script>
</body>
</html>
